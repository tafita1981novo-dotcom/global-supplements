name: Deploy para Hostinger

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Debug FTP - List directory structure
        run: |
          sudo apt-get install -y lftp > /dev/null 2>&1
          lftp -u u930134944,${{ secrets.FTP_PASSWORD }} ftp://82.29.199.81 << 'FTP'
          set ssl:verify-certificate no
          set ftp:ssl-allow yes
          ls /
          echo "---"
          ls /public_html/
          echo "---"
          ls /domains/ 2>/dev/null || echo "no /domains/"
          quit
          FTP

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'projeto-copia/package-lock.json'
      
      - name: Instalar dependências
        working-directory: ./projeto-copia
        run: npm ci

      - name: Criar .env
        working-directory: ./projeto-copia
        run: |
          cat > .env << EOF
          VITE_SUPABASE_URL=https://twglceexfetejawoumsr.supabase.co
          VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_PAYONEER_ID=99133638
          EOF
          sed -i 's/^          //' .env
      
      - name: Build do projeto
        working-directory: ./projeto-copia
        run: npm run build

      - name: Criar .htaccess SPA
        working-directory: ./projeto-copia
        run: |
          cat > dist/.htaccess << 'HTEOF'
          Options -MultiViews
          RewriteEngine On
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteRule ^ index.html [QSA,L]
          HTEOF
          sed -i 's/^          //' dist/.htaccess
      
      - name: Deploy via FTP para Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 82.29.199.81
          username: u930134944
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./projeto-copia/dist/
          server-dir: /public_html/
          dangerous-clean-slate: true
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
