name: Deploy para Hostinger

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
    - cron: '30 1 * * *'
    - cron: '0 3 * * *'
    - cron: '30 4 * * *'
    - cron: '0 6 * * *'
    - cron: '30 7 * * *'
    - cron: '0 9 * * *'
    - cron: '30 10 * * *'
    - cron: '0 12 * * *'
    - cron: '30 13 * * *'
    - cron: '0 15 * * *'
    - cron: '30 16 * * *'
    - cron: '0 18 * * *'
    - cron: '30 19 * * *'
    - cron: '0 21 * * *'
    - cron: '30 22 * * *'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v3
      
      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'projeto-copia/package-lock.json'
      
      - name: Instalar dependências
        working-directory: ./projeto-copia
        run: npm ci

      - name: Criar .env
        working-directory: ./projeto-copia
        run: |
          cat > .env << ENVEOF
          VITE_SUPABASE_URL=https://twglceexfetejawoumsr.supabase.co
          VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_RAPIDAPI_KEY_1=${{ secrets.RAPIDAPI_KEY }}
          VITE_OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          VITE_STRIPE_PUBLIC_KEY=${{ secrets.STRIPE_PUBLIC_KEY }}
          STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
          SENDGRID_API_KEY=${{ secrets.SENDGRID_API_KEY }}
          GMAIL_CLIENT_ID=${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET=${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN=${{ secrets.GMAIL_REFRESH_TOKEN }}
          VITE_PAYONEER_ID=99133638
          ENVEOF
      
      - name: Build do projeto
        working-directory: ./projeto-copia
        run: npm run build

      - name: Criar .htaccess SPA
        run: |
          cat > ./projeto-copia/dist/.htaccess << 'HTEOF'
          Options -MultiViews
          RewriteEngine On
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteRule ^ index.html [QSA,L]
          HTEOF
      
      - name: Deploy via FTP para Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 82.29.199.81
          username: u930134944
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./projeto-copia/dist/
          server-dir: /public_html/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
