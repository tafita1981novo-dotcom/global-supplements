name: Deploy para Hostinger

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'projeto-copia/package-lock.json'
      
      - name: Instalar dependências
        working-directory: ./projeto-copia
        run: npm ci

      - name: Criar .env
        working-directory: ./projeto-copia
        run: |
          cat > .env << EOF
          VITE_SUPABASE_URL=https://twglceexfetejawoumsr.supabase.co
          VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_PAYONEER_ID=99133638
          EOF
          sed -i 's/^          //' .env
      
      - name: Build do projeto
        working-directory: ./projeto-copia
        run: npm run build

      - name: Criar .htaccess SPA
        working-directory: ./projeto-copia
        run: |
          cat > dist/.htaccess << 'HTEOF'
          Options -MultiViews
          RewriteEngine On
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteRule ^ index.html [QSA,L]
          HTEOF
          sed -i 's/^          //' dist/.htaccess
      
      - name: Deploy via SFTP para Hostinger
        run: |
          sudo apt-get install -y sshpass lftp > /dev/null 2>&1
          
          echo "=== Listing directories via SFTP ==="
          sshpass -p "${{ secrets.FTP_PASSWORD }}" sftp -P 65002 -o StrictHostKeyChecking=no -o BatchMode=no u930134944@82.29.199.81 << 'SFTP' || true
          ls public_html
          ls domains
          quit
          SFTP
          
          echo "=== Uploading via lftp SFTP ==="
          lftp -e "
            set sftp:connect-program 'ssh -p 65002 -o StrictHostKeyChecking=no';
            open sftp://u930134944:${{ secrets.FTP_PASSWORD }}@82.29.199.81;
            cd public_html;
            mirror -R --delete --verbose ./projeto-copia/dist/ .;
            ls;
            quit
          " || echo "lftp failed, trying alternative..."
          
          echo "✅ Deploy complete!"
        working-directory: ${{ github.workspace }}
