name: Deploy para Hostinger

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'projeto-copia/package-lock.json'
      
      - name: Instalar dependências
        working-directory: ./projeto-copia
        run: npm ci

      - name: Criar .env
        working-directory: ./projeto-copia
        run: |
          cat > .env << EOF
          VITE_SUPABASE_URL=https://twglceexfetejawoumsr.supabase.co
          VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_PAYONEER_ID=99133638
          EOF
          sed -i 's/^          //' .env
      
      - name: Build do projeto
        working-directory: ./projeto-copia
        run: npm run build

      - name: Criar .htaccess SPA
        working-directory: ./projeto-copia
        run: |
          cat > dist/.htaccess << 'HTEOF'
          Options -MultiViews
          RewriteEngine On
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteRule ^ index.html [QSA,L]
          HTEOF
          sed -i 's/^          //' dist/.htaccess
      
      - name: Deploy via SFTP para Hostinger
        run: |
          sudo apt-get install -y sshpass > /dev/null 2>&1
          
          echo "=== Listing server directories ==="
          sshpass -p "${{ secrets.FTP_PASSWORD }}" ssh -p 65002 -o StrictHostKeyChecking=no u930134944@82.29.199.81 "ls -la ~/public_html/ | head -10; echo '---'; ls ~/domains/ 2>/dev/null || echo 'no domains dir'"
          
          echo "=== Cleaning public_html ==="
          sshpass -p "${{ secrets.FTP_PASSWORD }}" ssh -p 65002 -o StrictHostKeyChecking=no u930134944@82.29.199.81 "rm -rf ~/public_html/*"
          
          echo "=== Uploading via SCP ==="
          cd projeto-copia/dist
          sshpass -p "${{ secrets.FTP_PASSWORD }}" scp -P 65002 -o StrictHostKeyChecking=no -r ./* u930134944@82.29.199.81:~/public_html/
          
          echo "=== Verifying upload ==="
          sshpass -p "${{ secrets.FTP_PASSWORD }}" ssh -p 65002 -o StrictHostKeyChecking=no u930134944@82.29.199.81 "ls -la ~/public_html/ | head -10; echo '---'; ls ~/public_html/assets/ | head -5"
          
          echo "✅ Deploy complete!"
