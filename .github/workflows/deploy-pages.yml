name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'projeto-copia/package-lock.json'
      - run: npm ci
        working-directory: ./projeto-copia
      - run: |
          cat > .env << EOF
          VITE_SUPABASE_URL=https://twglceexfetejawoumsr.supabase.co
          VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_PAYONEER_ID=99133638
          EOF
          sed -i 's/^          //' .env
        working-directory: ./projeto-copia
      - run: npm run build
        working-directory: ./projeto-copia
      - run: cp projeto-copia/dist/index.html projeto-copia/dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./projeto-copia/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
